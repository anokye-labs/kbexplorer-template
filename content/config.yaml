title: "kbexplorer"
subtitle: "Interactive Knowledge Base Explorer"

clusters:
  engine:
    name: "Engine"
    color: "#4A9CC8"
  ui:
    name: "Interface"
    color: "#8CB050"
  visual:
    name: "Visual System"
    color: "#E8A838"
  data:
    name: "Data Layer"
    color: "#C07840"
  infra:
    name: "Infrastructure"
    color: "#5A98A8"
  design:
    name: "Design Decisions"
    color: "#A86FDF"
  guide:
    name: "Guide"
    color: "#39FF14"
  reference:
    name: "Reference"
    color: "#79C0FF"

providers:
  - type: wikipedia
    name: Concepts
    cluster: reference
    options:
      articles:
        - title: Knowledge graph
          connections: [graph-engine, type-system]
        - title: Force-directed graph drawing
          connections: [graph-network]
        - title: Graph (abstract data type)
          connections: [graph-engine, type-system]
        - title: Fluent Design System
          id: wiki-fluent
          connections: [style-system, theme-system]
        - title: Single-page application
          id: wiki-spa
          connections: [app-shell, vite-config]
